services:
  deepflow-singularity:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT}:3000"
    env_file:
      - .env
    environment:
      WEB_PORT: "3000"
      OPENCLAW_GATEWAY_URL: "http://127.0.0.1:18789"
    volumes:
      - ${HOST_DEEPFLOW_ASSETS_DIR:-/tmp/deepflow-assets}:/tmp/deepflow-assets
      - ${HOST_OPENCLAW_DEV_SHARED_DIR:-/tmp/openclaw-dev-shared}:/tmp/openclaw-dev-shared
      - ${HOST_OPENCLAW_DEV_SHARED_DIR:-/tmp/openclaw-dev-shared}:/.openclaw/shared
      - ${HOST_CODEX_DIR:-/tmp/deepflow-singularity-codex}:/root/.codex
