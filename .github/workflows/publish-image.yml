name: Publish Deepflow Singularity Image

on:
  push:
    branches:
      - "*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/jim0xff/deepflow-singularity

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    concurrency:
      group: publish-singularity-${{ github.ref_name }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute immutable image tag
        run: |
          echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Generate OCI metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_WRITE_USERNAME != '' && secrets.GHCR_WRITE_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_WRITE_TOKEN != '' && secrets.GHCR_WRITE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published image
        run: |
          {
            echo "Published image:"
            echo "- \`${IMAGE_NAME}:${IMAGE_TAG}\`"
            if [ -n "${{ secrets.GHCR_WRITE_TOKEN }}" ]; then
              echo "- auth: \`GHCR_WRITE_TOKEN\`"
            else
              echo "- auth: \`GITHUB_TOKEN\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
